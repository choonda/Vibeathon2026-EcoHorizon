<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ecohorizon">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ecohorizon</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAPMWhXDupTZ16jVwhhtrsmZ_DhSDIX4k8"></script>
  <style>
    /* Hide Google Maps logo, controls, terms, copyright and keyboard shortcut controls on Web */
    .gmnoprint,
    .gm-style-cc,
    .gm-style-mtc,
    .gm-svpc,
    .gm-fullscreen-control,
    .gm-bundled-control,
    .gm-bundled-control-on-bottom,
    a[href^="https://maps.google.com/maps"],
    a[href^="https://www.google.com/maps"],
    .gm-style-logo,
    a[title*="Google Maps"],
    img[alt="Google"] {
      display: none !important;
    }
  </style>
  <script>
    // Intercept Google Maps constructor to inject custom MapOptions (disableDefaultUI)
    (function() {
      const checkInterval = setInterval(function() {
        if (window.google && window.google.maps && window.google.maps.Map) {
          clearInterval(checkInterval);
          const originalMap = window.google.maps.Map;
          window.google.maps.Map = function(element, options) {
            if (options) {
              options.disableDefaultUI = true;
              options.zoomControl = false;
              options.fullscreenControl = false;
              options.streetViewControl = false;
              options.mapTypeControl = false;
              options.keyboardShortcuts = false;
            }
            return Reflect.construct(originalMap, [element, options]);
          };
          window.google.maps.Map.prototype = originalMap.prototype;
          Object.assign(window.google.maps.Map, originalMap);
        }
      }, 50);
    })();
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
